[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
⚠️ The project is still under active development. Until `1.0.0`, breaking changes can be included in MINOR versions.
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits | unique(attribute="message") %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",                         group = "<!-- 0 -->✨ Features" },
  { message = "^fix",                          group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf",                         group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor",                     group = "<!-- 3 -->🚜 Refactor" },
  { message = "^doc",                          group = "<!-- 4 -->📚 Documentation" },
  { message = "^test",                         group = "<!-- 5 -->🧪 Testing" },
  { message = "^style",                        group = "<!-- 6 -->🎨 Styling" },
  { message = "^chore\\(release\\): prepare", skip = true },
  { message = "^chore\\(deps",                skip = true },
  { message = "^chore|^ci|^build",            group = "<!-- 7 -->⚙️ Miscellaneous" },
  { body = ".*security",                       group = "<!-- 8 -->🛡️ Security" },
  { message = "^revert",                       group = "<!-- 9 -->◀️ Revert" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"