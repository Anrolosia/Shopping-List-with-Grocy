[flake8]
# E203: Whitespace before ':'
# W503: Line break occurred before a binary operator (deprecated)
ignore = E203,W503
max-line-length = 88

[isort]
profile = black

[tool:pytest]
asyncio_mode = strict
# Exit code 5 (no tests collected) is treated as success during early development.
# Remove this line once the test suite has meaningful coverage.
addopts = --tb=short
# Suppress the pytest-asyncio loop scope warning
filterwarnings =
    ignore::pytest.PytestDeprecationWarning

[coverage:run]
branch = False
source = custom_components/shopping_list_with_grocy

[coverage:report]
show_missing = true